apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-home-ijlalahmad-dev
  namespace: traefik
spec:
  secretName: wildcard-home-ijlalahmad-dev-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.home.ijlalahmad.dev"
    - "home.ijlalahmad.dev"
