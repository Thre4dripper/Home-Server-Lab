apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab
  namespace: argocd
  # Deleting this Application cascades and removes ALL managed apps + their resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thre4dripper/Home-Server-Lab.git
    targetRevision: HEAD
    # ArgoCD watches this directory — every Application YAML here becomes a managed app
    path: k3s/infra/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # Remove Application objects deleted from git
      selfHeal: true   # Revert manual changes back to git state
    syncOptions:
      - CreateNamespace=true
