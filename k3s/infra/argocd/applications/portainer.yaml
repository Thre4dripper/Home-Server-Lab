apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portainer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thre4dripper/Home-Server-Lab.git
    targetRevision: HEAD
    path: k3s/apps/portainer
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true      # Remove resources deleted from git
      selfHeal: true   # Revert manual kubectl changes back to git state
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Use k8s field manager — ignores server-added fields
                               # (clusterIP, nodePort, sessionAffinity, finalizers etc.)
  # Ignore kubectl rollout restart annotation — it's written to cluster by our scripts
  # but is not in git. Without this, every rollout restart would cause OutOfSync.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
