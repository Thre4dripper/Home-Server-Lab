apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard-lb
  namespace: traefik
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-traefik
  ports:
    - name: dashboard
      port: 8090
      targetPort: 8080
      protocol: TCP
