# Traefik Helm values for Home Server Lab
# Installed via: helm install traefik traefik/traefik -n traefik --create-namespace -f values.yaml

# ServiceLB (Klipper) handles external port binding — no hostPort needed
ports:
  web:
    hostPort: null
    # Redirect all HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    hostPort: null
  # TCP entrypoint for MongoDB replica-set external access.
  # Traefik terminates TLS here using the wildcard cert and routes by HostSNI
  # (mongo-0/1/2.home.ijlalahmad.dev) to the matching StatefulSet pod.
  mongodb:
    port: 27017
    expose:
      default: true
    exposedPort: 27017
    protocol: TCP
  # TCP entrypoint for Redis external access.
  # No TLS — Traefik routes all traffic on this port to Redis (HostSNI(*)).
  redis:
    port: 6379
    expose:
      default: true
    exposedPort: 6379
    protocol: TCP

# Run on the control-plane node
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Single replica (single node cluster)
deployment:
  replicas: 1

# Enable dashboard via both:
#   - IngressRoute on port 80 (Host: traefik.lan)
#   - Direct IP on port 8090 (api.insecure exposes the traefik entrypoint)
api:
  insecure: true

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.home.ijlalahmad.dev`)
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-home-ijlalahmad-dev-tls

# Enable access logs
logs:
  access:
    enabled: true

# Resource limits for Raspberry Pi
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

# Providers
providers:
  kubernetesIngress:
    publishedService:
      enabled: true
  kubernetesCRD:
    allowCrossNamespace: true
