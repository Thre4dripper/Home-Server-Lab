# Traefik Helm values for Home Server Lab
# Installed via: helm install traefik traefik/traefik -n traefik --create-namespace -f values.yaml

# ServiceLB (Klipper) handles external port binding — no hostPort needed
ports:
  web:
    hostPort: null
  websecure:
    hostPort: null

# Run on the control-plane node
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Single replica (single node cluster)
deployment:
  replicas: 1

# Enable dashboard — served over HTTP (port 80) via Traefik's own routing.
# websecure (443) requires TLS certs; we don't have them, so use web (80).
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.lan`)
    entryPoints:
      - web

# Enable access logs
logs:
  access:
    enabled: true

# Resource limits for Raspberry Pi
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

# Providers
providers:
  kubernetesIngress:
    publishedService:
      enabled: true
  kubernetesCRD:
    allowCrossNamespace: true
