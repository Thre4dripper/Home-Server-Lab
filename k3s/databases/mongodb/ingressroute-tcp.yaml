## Traefik IngressRouteTCP for external MongoDB replica-set access.
##
## Lives in the `traefik` namespace. The `services[].namespace: databases`
## field is allowed because Traefik is installed with
## providers.kubernetesCRD.allowCrossNamespace: true.
##
## Flow per request:
##   1. Client opens TLS to mongo-N.home.ijlalahmad.dev:27017 — DNS resolves
##      to 192.168.0.108 (Traefik LB).
##   2. Traefik reads SNI from the TLS ClientHello, does NOT decrypt the
##      connection, and forwards the encrypted TCP stream to the matching
##      per-pod service in the `databases` namespace.
##   3. mongod terminates TLS using the mongodb-server-tls certificate.
##   4. mongod replies with its replica-set hello, which advertises the
##      external `horizons` (mongo-N.home.ijlalahmad.dev) so the driver can
##      reach every member through the same pattern.

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mongodb-0
  namespace: traefik
spec:
  entryPoints:
    - mongodb
  routes:
    - match: HostSNI(`mongo-0.home.ijlalahmad.dev`)
      services:
        - name: mongodb-0
          namespace: databases
          port: 27017
  tls:
    passthrough: true
