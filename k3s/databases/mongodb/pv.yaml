## Retained MongoDB Persistent Volume
##
## Single-node Pi cluster runs Mongo as a 1-member replica set (rs0).
## Replication across pods on the same physical host adds zero availability,
## so we keep one PV/pod and rely on logical backups (mongodump) for durability.
##
## Apply with: kubectl apply -f pv.yaml

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv-0
spec:
  capacity:
    storage: 20Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /home/pi/k3s-volumes/databases/mongodb/mongodb-0
    type: DirectoryOrCreate
  claimRef:
    namespace: databases
    name: data-mongodb-0
