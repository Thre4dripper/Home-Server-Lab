apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pv.yaml
  - sealedsecret.yaml
  - service-headless.yaml
  - service-per-pod.yaml
  - service.yaml
  - statefulset.yaml
  - ingressroute-tcp.yaml
  - certificate.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: mongodb-config
    files:
      - config/mongod.conf
      - config/init.js
