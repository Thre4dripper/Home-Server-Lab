## Per-pod ClusterIP service for the MongoDB StatefulSet.
##
## Targets the single mongodb-0 pod via its statefulset.kubernetes.io/pod-name
## label. Internal apps connect through services/internal.yaml; this exists so
## Traefik IngressRouteTCP can route the external SNI hostname to the pod.

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-0
  namespace: databases
spec:
  selector:
    statefulset.kubernetes.io/pod-name: mongodb-0
  ports:
    - port: 27017
      targetPort: 27017
