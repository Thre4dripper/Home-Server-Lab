apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
data:
  redis.conf: |
    # Memory
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence (AOF for reliability)
    appendonly yes
    appendfsync everysec

    # 16 logical databases (SELECT 0-15)
    databases 16

    # Password is injected at runtime via --requirepass from the Secret.
    # Do not set requirepass here — this file is committed to git.

    # Bind to all interfaces inside the pod
    bind 0.0.0.0
    protected-mode yes
    port 6379

    # Tuning for Raspberry Pi
    hz 10
    dynamic-hz yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
