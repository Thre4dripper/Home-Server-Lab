## Traefik IngressRouteTCP for external Redis access.
##
## Redis does not use TLS, so Traefik cannot route by HostSNI.
## HostSNI("*") is the only valid match for non-TLS TCP — all traffic on
## the dedicated `redis` entrypoint (port 6379) is forwarded to Redis.
##
## Cloudflare DNS: redis.home.ijlalahmad.dev → 192.168.0.108
## Connection string: redis://:redisRoot2024!@redis.home.ijlalahmad.dev:6379

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: redis
  namespace: traefik
spec:
  entryPoints:
    - redis
  routes:
    - match: HostSNI(`*`)
      services:
        - name: redis
          namespace: databases
          port: 6379
