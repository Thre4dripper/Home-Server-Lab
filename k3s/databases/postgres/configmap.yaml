apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: databases
data:
  01-init.sql: |
    -- Lock down default public privileges
    -- New users cannot connect to other users' databases
    REVOKE CONNECT ON DATABASE template1 FROM PUBLIC;

  postgresql.conf: |
    # Memory tuning for Raspberry Pi 5
    shared_buffers                  = 64MB
    effective_cache_size            = 256MB
    maintenance_work_mem            = 32MB
    work_mem                        = 4MB
    max_connections                 = 50
    wal_buffers                     = 4MB
    checkpoint_completion_target    = 0.9
    random_page_cost                = 1.1
    effective_io_concurrency        = 200
    # Logging
    log_min_duration_statement      = 1000
    log_timezone                    = 'UTC'
    # Connections
    listen_addresses                = '*'
