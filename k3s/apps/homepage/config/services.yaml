- Infrastructure:
    - ArgoCD:
        icon: argo-cd
        href: https://argocd.home.ijlalahmad.dev
        siteMonitor: https://argocd.home.ijlalahmad.dev
        description: GitOps delivery
        namespace: argocd
        app: argocd-server
        showStats: true
        widget:
            type: argocd
            url: http://argocd-server.argocd.svc.cluster.local
            key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"
            fields: ["apps", "synced", "outOfSync", "healthy"]
    - Traefik:
        icon: traefik
        href: https://traefik.home.ijlalahmad.dev
        siteMonitor: https://traefik.home.ijlalahmad.dev
        description: Ingress proxy
        namespace: traefik
        app: traefik
        showStats: true
        widget:
            type: traefik
            url: http://traefik-dashboard-lb.traefik.svc.cluster.local:8090
    - Cert Manager:
        icon: mdi-certificate
        description: TLS automation
        namespace: cert-manager
        app: cert-manager
        showStats: true
    - Databases:
        - MongoDB:
            icon: mongodb
            description: Document database
            namespace: databases
            app: mongodb
            podSelector: "app=mongodb"
            showStats: true
        - PostgreSQL:
            icon: postgres
            description: Relational database
            namespace: databases
            app: postgres
            podSelector: "app=postgres"
            showStats: true
        - Redis:
            icon: redis
            description: In-memory store
            namespace: databases
            app: redis
            podSelector: "app=redis"
            showStats: true

- System & Info:
    - Calendar:
        icon: mdi-calendar-month
        widget:
            type: calendar
            firstDayInWeek: monday
            view: monthly
            maxEvents: 10
            showTime: true
            timezone: Asia/Kolkata
            integrations:
              - type: ical
                url: "{{HOMEPAGE_VAR_CALENDAR_ICAL}}"
                name: My Events
    - Service Details:
        - Portainer:
            icon: portainer
            href: https://portainer.home.ijlalahmad.dev
            description: Container management
            widget:
              type: portainer
              url: http://portainer.monitoring.svc.cluster.local:8500
              env: 5
              kubernetes: true
              key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
        - File Browser:
            icon: filebrowser
            href: https://files.home.ijlalahmad.dev
            description: File manager
            widget:
              type: filebrowser
              url: http://filebrowser.file-management.svc.cluster.local:8300
              username: admin
              password: "{{HOMEPAGE_VAR_FILEBROWSER_PASS}}"
              authHeader: X-My-Header
        - Jellyfin:
            icon: jellyfin
            href: https://jellyfin.home.ijlalahmad.dev
            description: Media library
            widget:
              type: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8200
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
              enableBlocks: true
              enableNowPlaying: true
        - Aria2:
            icon: mdi-cloud-download
            href: https://aria2.home.ijlalahmad.dev
            description: Download manager
            widgets:
              - type: customapi
                url: http://aria2.downloads.svc.cluster.local:8080/jsonrpc
                method: POST
                headers:
                  content-type: application/json
                requestBody:
                  jsonrpc: "2.0"
                  method: aria2.getGlobalStat
                  id: homepage
                  params:
                    - "token:{{HOMEPAGE_VAR_ARIA2_SECRET}}"
                refreshInterval: 2000
                display: block
                mappings:
                  - field: result.downloadSpeed
                    label: Download
                    format: bytes
                    suffix: "/s"
                  - field: result.uploadSpeed
                    label: Upload
                    format: bytes
                    suffix: "/s"
                  - field: result.numActive
                    label: Active
                    format: number
                  - field: result.numWaiting
                    label: Waiting
                    format: number
              - type: customapi
                url: http://aria2.downloads.svc.cluster.local:8080/jsonrpc
                method: POST
                headers:
                  content-type: application/json
                requestBody:
                  jsonrpc: "2.0"
                  method: aria2.tellActive
                  id: homepage
                  params:
                    - "token:{{HOMEPAGE_VAR_ARIA2_SECRET}}"
                refreshInterval: 2000
                display: dynamic-list
                mappings:
                  items: result
                  name: files.0.path
                  label: downloadSpeed
                  format: bytes
                  suffix: "/s"
                  limit: 10

