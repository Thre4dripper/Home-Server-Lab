apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: dashboard-network
  labels:
    app: homepage
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
      annotations:
        # Bump to force pod restart if needed (config changes are hot-reloaded via hostPath)
        config/checksum: "v2"
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ['sh', '-c', 'cp /config-src/* /app/config/']
          volumeMounts:
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.home.ijlalahmad.dev
            - name: LOG_TARGETS
              value: stdout
            - name: HOMEPAGE_VAR_FINNHUB_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_FINNHUB_KEY
            - name: HOMEPAGE_VAR_OPENWEATHER_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_OPENWEATHER_KEY
            - name: HOMEPAGE_VAR_PORTAINER_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_PORTAINER_KEY
            - name: HOMEPAGE_VAR_JELLYFIN_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_JELLYFIN_KEY
            - name: HOMEPAGE_VAR_ARGOCD_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_ARGOCD_KEY
            - name: HOMEPAGE_VAR_ARIA2_SECRET
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_ARIA2_SECRET
            - name: HOMEPAGE_VAR_CALENDAR_ICAL
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_CALENDAR_ICAL
            - name: HOMEPAGE_VAR_FILEBROWSER_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_FILEBROWSER_PASS
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: widgets
              mountPath: /app/public/widgets
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config-src
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
        - name: widgets
          configMap:
            name: homepage-widgets
