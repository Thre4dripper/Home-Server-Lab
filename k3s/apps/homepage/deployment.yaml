apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: dashboard-network
  labels:
    app: homepage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.home.ijlalahmad.dev
            - name: LOG_TARGETS
              value: stdout
            - name: HOMEPAGE_VAR_FINNHUB_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_FINNHUB_KEY
            - name: HOMEPAGE_VAR_PORTAINER_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_PORTAINER_KEY
            - name: HOMEPAGE_VAR_JELLYFIN_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_JELLYFIN_KEY
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: homepage-config
