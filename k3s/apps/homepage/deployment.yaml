apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: dashboard-network
  labels:
    app: homepage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
      annotations:
        # Force pod restart when configmaps/secrets change (manual: bump these)
        config/checksum: "v1"
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /config-source/* /app/config/
          volumeMounts:
            - name: config-source
              mountPath: /config-source
            - name: config
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.home.ijlalahmad.dev
            - name: LOG_TARGETS
              value: stdout
            - name: HOMEPAGE_VAR_FINNHUB_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_FINNHUB_KEY
            - name: HOMEPAGE_VAR_OPENWEATHER_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_OPENWEATHER_KEY
            - name: HOMEPAGE_VAR_PORTAINER_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_PORTAINER_KEY
            - name: HOMEPAGE_VAR_JELLYFIN_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_JELLYFIN_KEY
            - name: HOMEPAGE_VAR_ARGOCD_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_ARGOCD_KEY
            - name: HOMEPAGE_VAR_BITCOMET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_BITCOMET_TOKEN
            - name: HOMEPAGE_VAR_CALENDAR_ICAL
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_CALENDAR_ICAL
            - name: HOMEPAGE_VAR_FILEBROWSER_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: HOMEPAGE_VAR_FILEBROWSER_PASS
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: widgets
              mountPath: /app/public/widgets
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.home.ijlalahmad.dev
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config-source
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
        - name: widgets
          configMap:
            name: homepage-widgets
