apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: dashboard-network
  labels:
    app: homepage
data:
  # ─── Settings ────────────────────────────────────────────────────────────────
  settings.yaml: |
    ---
    title: Home Server Lab
    favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/homepage.png

    theme: dark
    color: sky
    headerStyle: boxed
    iconStyle: theme

    background:
      image: https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=3440&q=80
      blur: sm
      saturate: 50
      brightness: 50
      opacity: 50
    cardBlur: sm

    fullWidth: true
    maxGroupColumns: 5
    useEqualHeights: true
    showStats: true
    statusStyle: basic
    disableCollapse: true
    hideVersion: true

    layout:
      Markets:
        icon: mdi-chart-line
        style: row
        columns: 2
      Services:
        icon: mdi-server
      Infrastructure:
        icon: mdi-kubernetes
      System & Info:
        icon: mdi-monitor-dashboard
      Links:
        icon: mdi-link-variant

    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      provider: google

    providers:
      openweathermap: "{{HOMEPAGE_VAR_OPENWEATHER_KEY}}"
      finnhub: "{{HOMEPAGE_VAR_FINNHUB_KEY}}"

  # ─── Top-bar Widgets ────────────────────────────────────────────────────────
  widgets.yaml: |
    ---
    - datetime:
        text_size: l
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

    - search:
        provider: google
        target: _blank

    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "k3s"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - resources:
        cpu: true
        memory: true
        disk:
          - /

  # ─── Service Tiles ─────────────────────────────────────────────────────────
  services.yaml: |
    ---
    # ┌─────────────┬─────────────┬─────────────────┬──────────────┬─────────┐
    # │  Markets    │  Services   │ Infrastructure  │ System & Info│  Links  │
    # └─────────────┴─────────────┴─────────────────┴──────────────┴─────────┘

    - Markets:
        - NVDA:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:NVDA"
              classes: h-52
              allowScrolling: no
        - AAPL:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:AAPL"
              classes: h-52
              allowScrolling: no
        - GOOGL:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:GOOGL"
              classes: h-52
              allowScrolling: no
        - TSLA:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:TSLA"
              classes: h-52
              allowScrolling: no
        - AMZN:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:AMZN"
              classes: h-52
              allowScrolling: no
        - META:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:META"
              classes: h-52
              allowScrolling: no
        - NFLX:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:NFLX"
              classes: h-52
              allowScrolling: no
        - TM:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NYSE:TM"
              classes: h-52
              allowScrolling: no
        - TTWO:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:TTWO"
              classes: h-52
              allowScrolling: no
        - EA:
            widget:
              type: iframe
              src: "/widgets/mini-chart.html?symbol=NASDAQ:EA"
              classes: h-52
              allowScrolling: no

    - Services:
        - Portainer:
            icon: portainer
            href: https://portainer.home.ijlalahmad.dev
            siteMonitor: https://portainer.home.ijlalahmad.dev
            description: Container management
            namespace: monitoring
            app: portainer
            podSelector: "app=portainer"
            showStats: true
        - Jellyfin:
            icon: jellyfin
            href: https://jellyfin.home.ijlalahmad.dev
            siteMonitor: https://jellyfin.home.ijlalahmad.dev
            description: Media streaming
            namespace: media
            app: jellyfin
            podSelector: "app=jellyfin"
            showStats: true
        - Dashdot:
            icon: dashdot
            href: https://dashdot.home.ijlalahmad.dev
            siteMonitor: https://dashdot.home.ijlalahmad.dev
            description: Hardware monitor
            namespace: monitoring
            app: dashdot
            podSelector: "app=dashdot"
            showStats: true
        - Home Assistant:
            icon: home-assistant
            href: https://ha.home.ijlalahmad.dev
            siteMonitor: https://ha.home.ijlalahmad.dev
            description: Smart home hub
            namespace: automation
            app: home-assistant
            podSelector: "app=home-assistant"
            showStats: true
        - BitComet:
            icon: mdi-star-shooting
            href: https://bitcomet.home.ijlalahmad.dev/webui/
            siteMonitor: https://bitcomet.home.ijlalahmad.dev
            description: BitTorrent client
            namespace: downloads
            app: bitcomet
            podSelector: "app=bitcomet"
            showStats: true
        - File Browser:
            icon: filebrowser
            href: https://files.home.ijlalahmad.dev
            siteMonitor: https://files.home.ijlalahmad.dev
            description: Web file manager
            namespace: file-management
            app: filebrowser
            podSelector: "app=filebrowser"
            showStats: true
        - Samba:
            icon: mdi-folder-network
            description: Network shares (SMB)
            namespace: file-management
            app: samba
            podSelector: "app=samba"
            showStats: true
        - Twingate:
            icon: twingate
            href: https://www.twingate.com
            description: Zero-trust VPN
            namespace: dashboard-network
            app: twingate
            podSelector: "app=twingate"
            showStats: true

    - Infrastructure:
        - ArgoCD:
            icon: argo-cd
            href: https://argocd.home.ijlalahmad.dev
            siteMonitor: https://argocd.home.ijlalahmad.dev
            description: GitOps delivery
            namespace: argocd
            app: argocd-server
            showStats: true
            widget:
                type: argocd
                url: https://argocd.home.ijlalahmad.dev
                key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"
                fields: ["apps", "synced", "outOfSync", "healthy"]
        - Traefik:
            icon: traefik
            href: https://traefik.home.ijlalahmad.dev
            siteMonitor: https://traefik.home.ijlalahmad.dev
            description: Ingress proxy
            namespace: traefik
            app: traefik
            showStats: true
            widget:
                type: traefik
                url: https://traefik.home.ijlalahmad.dev
        - Cert Manager:
            icon: mdi-certificate
            description: TLS automation
            namespace: cert-manager
            app: cert-manager
            showStats: true
        - Databases:
            - MongoDB:
                icon: mongodb
                description: Document database
                namespace: databases
                app: mongodb
                podSelector: "app=mongodb"
                showStats: true
            - PostgreSQL:
                icon: postgres
                description: Relational database
                namespace: databases
                app: postgres
                podSelector: "app=postgres"
                showStats: true
            - Redis:
                icon: redis
                description: In-memory store
                namespace: databases
                app: redis
                podSelector: "app=redis"
                showStats: true

    - System & Info:
        - Calendar:
            icon: mdi-calendar-month
            widget:
                type: calendar
                firstDayInWeek: monday
                view: monthly
                maxEvents: 10
                showTime: true
                timezone: Asia/Kolkata
                integrations:
                  - type: ical
                    url: "{{HOMEPAGE_VAR_CALENDAR_ICAL}}"
                    name: My Events
        - Service Details:
            - Portainer:
                icon: portainer
                href: https://portainer.home.ijlalahmad.dev
                description: Container management
                widget:
                  type: portainer
                  url: https://portainer.home.ijlalahmad.dev
                  env: 5
                  kubernetes: true
                  key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
            - File Browser:
                icon: filebrowser
                href: https://files.home.ijlalahmad.dev
                description: File manager
                widget:
                  type: filebrowser
                  url: https://files.home.ijlalahmad.dev
                  username: admin
                  password: "{{HOMEPAGE_VAR_FILEBROWSER_PASS}}"
                  authHeader: X-My-Header
            - Jellyfin:
                icon: jellyfin
                href: https://jellyfin.home.ijlalahmad.dev
                description: Media library
                widget:
                  type: jellyfin
                  url: https://jellyfin.home.ijlalahmad.dev
                  key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
                  enableBlocks: true
                  enableNowPlaying: true
            - BitComet:
                icon: mdi-star-shooting
                href: https://bitcomet.home.ijlalahmad.dev/webui/
                description: Torrent tasks
                widgets:
                  - type: customapi
                    url: https://bitcomet.home.ijlalahmad.dev/api_v2/task_list/get
                    method: POST
                    headers:
                      authorization: "Bearer {{HOMEPAGE_VAR_BITCOMET_TOKEN}}"
                      client-type: "BitComet WebUI"
                      content-type: "application/json"
                    requestBody:
                      state_group: "ALL"
                      task_type: "ALL"
                      tag_filter: "ALL"
                      sort_key: ""
                      sort_order: "unsorted"
                      keyword: ""
                      start: 0
                      limit: 100
                    refreshInterval: 2000
                    display: block
                    mappings:
                      - field: filtered_task_count
                        label: Tasks
                        format: number
                      - field: version
                        label: Version
                        format: string
                      - field: platform
                        label: Platform
                        format: string
                  - type: customapi
                    url: https://bitcomet.home.ijlalahmad.dev/api_v2/task_list/get
                    method: POST
                    headers:
                      authorization: "Bearer {{HOMEPAGE_VAR_BITCOMET_TOKEN}}"
                      client-type: "BitComet WebUI"
                      content-type: "application/json"
                    requestBody:
                      state_group: "ALL"
                      task_type: "ALL"
                      tag_filter: "ALL"
                      sort_key: ""
                      sort_order: "unsorted"
                      keyword: ""
                      start: 0
                      limit: 100
                    refreshInterval: 2000
                    display: dynamic-list
                    mappings:
                      items: tasks
                      name: task_name
                      label: download_rate
                      format: bytes
                      suffix: "/s"
                      limit: 20

    - Links:
        - Developer:
            - GitHub:
                icon: github
                href: https://github.com/
                description: Code hosting
            - ChatGPT:
                icon: chatgpt
                href: https://chat.openai.com/
                description: AI assistant
            - Docker Hub:
                icon: docker
                href: https://hub.docker.com/
                description: Container registry
            - Homepage Docs:
                icon: homepage
                href: https://gethomepage.dev/
                description: Dashboard docs
        - Social:
            - Youtube:
                icon: youtube
                href: https://youtube.com/
                description: Video platform
            - Reddit:
                icon: reddit
                href: https://reddit.com
                description: Community forums
            - Twitter / X:
                icon: x
                href: https://x.com/
                description: Social network
        - Homelab:
            - Cloudflare:
                icon: cloudflare
                href: https://dash.cloudflare.com/
                description: DNS & CDN
            - Awesome Selfhosted:
                icon: mdi-star
                href: https://awesome-selfhosted.net/
                description: Curated list
            - Selfhosted Wiki:
                icon: mdi-book-open-variant
                href: https://wiki.selfhosted.show/
                description: Community wiki

  # ─── Bookmarks (links live in services.yaml Links group) ────────────────────
  bookmarks.yaml: |
    ---
    # Bookmarks moved to Links column in services.yaml

  # ─── Kubernetes Discovery ──────────────────────────────────────────────────
  kubernetes.yaml: |
    ---
    mode: cluster

  # ─── Docker Discovery (disabled in k3s) ────────────────────────────────────
  docker.yaml: |
    ---

  # ─── Custom CSS ─────────────────────────────────────────────────────────────
  custom.css: |
    /* ═══════════════════════════════════════════════════
           HOME SERVER LAB — Glassmorphism Dark Theme
           5-column layout for ultrawide
           ═══════════════════════════════════════════════════ */

    /* ─── Full-Width Layout ─── */
    #page_container {
      max-width: 100% !important;
      padding: 0.75rem 1.5rem !important;
    }
    #information-widgets {
      max-width: 100% !important;
    }

    /* ─── Status Bar (Top Widget Strip) ─── */
    #information-widgets {
      border-bottom: 1px solid rgba(71, 85, 105, 0.3) !important;
      padding: 0.4rem 1rem !important;
      margin-bottom: 0.75rem !important;
    }

    /* ─── Group Headers — Minimal Labels ─── */
    section h2 {
      font-size: 0.7rem !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      font-weight: 600 !important;
      opacity: 0.85;
    }

    /* ─── Service Cards — Glass Panels ─── */
    li article {
      border: 1px solid rgba(71, 85, 105, 0.12) !important;
      transition: all 0.2s ease !important;
    }
    li article:hover {
      border-color: rgba(100, 116, 139, 0.4) !important;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3) !important;
      transform: translateY(-1px);
    }

    /* ─── Bookmarks — Subtle Footer ─── */
    #bookmarks {
      border-top: 1px solid rgba(71, 85, 105, 0.2) !important;
      margin-top: 0.75rem !important;
      padding-top: 0.75rem !important;
    }

    /* ─── Thin Scrollbar ─── */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(71, 85, 105, 0.4);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.6);
    }

    /* ─── Ultrawide Breakpoints ─── */
    @media (min-width: 2560px) {
      #page_container {
        padding: 0.75rem 3rem !important;
      }
    }
    @media (min-width: 3440px) {
      #page_container {
        padding: 1rem 5rem !important;
      }
    }

    /* ─── TradingView Chart Iframes ─── */
    iframe {
      border: none !important;
      border-radius: 6px !important;
      background: transparent !important;
    }

    /* ─── 5 column layout for ultrawide ─── */
    @media (min-width: 1280px) {
      #layout-groups > .services-group:nth-child(1) {
        flex: 0 0 22% !important;
        max-width: 22% !important;
      }
      #layout-groups > .services-group:nth-child(2) {
        flex: 0 0 20% !important;
        max-width: 20% !important;
      }
      #layout-groups > .services-group:nth-child(3) {
        flex: 0 0 20% !important;
        max-width: 20% !important;
      }
      #layout-groups > .services-group:nth-child(4) {
        flex: 0 0 20% !important;
        max-width: 20% !important;
      }
      #layout-groups > .services-group:nth-child(5) {
        flex: 0 0 18% !important;
        max-width: 18% !important;
      }
    }

    /* ─── Markets Column: Compact stock cards, chart-only ─── */
    #layout-groups > .services-group:nth-child(1) .service-card {
      margin-bottom: 2px !important;
      padding: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    #layout-groups > .services-group:nth-child(1) .service-title {
      display: none !important;
    }
    #layout-groups > .services-group:nth-child(1) .service-block {
      margin: 0 !important;
      padding: 0 !important;
    }
    #layout-groups > .services-group:nth-child(1) iframe {
      border-radius: 4px !important;
    }

    /* ─── Calendar: fill its column ─── */
    #layout-groups > .services-group:nth-child(4) ul > li:first-child article {
      margin-left: auto !important;
      margin-right: auto !important;
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-widgets
  namespace: dashboard-network
  labels:
    app: homepage
data:
  mini-chart.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;background:transparent;overflow:hidden}
      tv-mini-chart{display:block;width:100%;height:calc(100% + 24px);background: transparent;}
    </style>
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-mini-chart.js"></script>
    </head>
    <body style="background: transparent;">
    <script>
      const symbol = new URLSearchParams(window.location.search).get('symbol');
      if (/^[A-Z]+:[A-Z0-9.]+$/i.test(symbol)) {
        const el = document.createElement('tv-mini-chart');
        el.setAttribute('symbol', symbol);
        el.setAttribute('locale', 'en');
        el.setAttribute('theme', 'dark');
        el.setAttribute('show-time-scale', 'true');
        el.toggleAttribute('transparent', true);
        document.body.appendChild(el);
      }
    </script>
    </body>
    </html>
