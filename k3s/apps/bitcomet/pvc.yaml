apiVersion: v1
kind: PersistentVolume
metadata:
  name: bitcomet-config
spec:
  capacity:
    storage: 500Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /home/pi/k3s-volumes/apps/bitcomet/config
    type: DirectoryOrCreate
  claimRef:
    name: bitcomet-config
    namespace: downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bitcomet-config
  namespace: downloads
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: bitcomet-config
  resources:
    requests:
      storage: 500Mi
---
# Downloads PV — capacity is just a label for hostPath, not enforced.
# The actual limit is the free space on the host filesystem backing /home/pi/k3s-volumes.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bitcomet-downloads
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    # Shared with aria2-downloads. Both clients write into the same pendrive
    # downloads directory; their control files (.bc!, .aria2) coexist cleanly.
    path: /home/pi/pendrive/downloads
    type: DirectoryOrCreate
  claimRef:
    name: bitcomet-downloads
    namespace: downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bitcomet-downloads
  namespace: downloads
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: bitcomet-downloads
  resources:
    requests:
      storage: 200Gi
