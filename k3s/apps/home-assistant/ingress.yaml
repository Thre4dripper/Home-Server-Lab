apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: automation
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ha.home.ijlalahmad.dev`)
      kind: Rule
      services:
        - name: home-assistant
          port: 8123
  tls:
    secretName: wildcard-home-ijlalahmad-dev-tls
