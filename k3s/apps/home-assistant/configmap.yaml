apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
  namespace: automation
data:
  configuration.yaml: |
    # Explicit components only — replaces default_config to reduce RAM usage.

    frontend:
      themes: !include_dir_merge_named themes

    # Bluetooth — required for smart bulb discovery
    bluetooth:

    # Recorder: 3 days only, skip noisy domains
    recorder:
      purge_keep_days: 3
      commit_interval: 30
      exclude:
        domains:
          - sun
          - weather
          - update
          - person
          - persistent_notification

    history:
      exclude:
        domains:
          - sun
          - weather
          - update

    logbook:
      exclude:
        domains:
          - sun
          - weather

    # --- BEGIN setup.sh managed http block ---
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 127.0.0.1
        - ::1
        - 10.42.0.0/16
        - 172.16.0.0/12
    # --- END setup.sh managed http block ---

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml
