apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init
  namespace: databases
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
      wiredTiger:
        engineConfig:
          # Limit RAM cache — critical for Raspberry Pi
          cacheSizeGB: 0.25
    net:
      port: 27017
      bindIp: 0.0.0.0
    security:
      authorization: enabled
    operationProfiling:
      slowOpThresholdMs: 1000
