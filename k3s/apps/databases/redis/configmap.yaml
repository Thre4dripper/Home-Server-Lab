apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
data:
  redis.conf: |
    # Memory
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence (AOF for reliability)
    appendonly yes
    appendfsync everysec

    # Enable 16 logical databases (SELECT 0 through SELECT 15)
    # Convention:
    #   0  = default / shared
    #   1  = n8n
    #   2  = homarr
    #   3  = homeassistant
    #   4  = nextcloud
    #   5-9  = dev projects
    #   10-15 = staging / testing
    databases 16

    # ACL — per-service users with full access to all databases
    aclfile /etc/redis/users.acl

    # Bind to all interfaces inside the pod
    bind 0.0.0.0
    protected-mode no
    port 6379

    # Tuning for Raspberry Pi
    hz 10
    dynamic-hz yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes

  users.acl: |
    user default off
    user admin on >adminRedis2024! ~* &* +@all
    user n8n on >n8nRedis2024! ~* &* +@all
    user nextcloud on >nextcloudRedis2024! ~* &* +@all
    user homarr on >homarrRedis2024! ~* &* +@all
    user homeassistant on >haRedis2024! ~* &* +@all
