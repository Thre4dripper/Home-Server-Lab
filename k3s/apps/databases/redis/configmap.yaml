apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
data:
  redis.conf: |
    # Memory
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence (AOF for reliability)
    appendonly yes
    appendfsync everysec

    # 16 logical databases available (SELECT 0 through SELECT 15)
    # Create users via ACL to isolate access per application
    databases 16

    # ACL — per-service users with full access to all databases
    aclfile /etc/redis/users.acl

    # Bind to all interfaces inside the pod
    bind 0.0.0.0
    protected-mode no
    port 6379

    # Tuning for Raspberry Pi
    hz 10
    dynamic-hz yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes

  users.acl: |
    user default on nopass ~* resetchannels +ping +info
    user admin on >adminRedis2024! ~* &* +@all
