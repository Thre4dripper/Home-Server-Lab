apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashdot
  namespace: dashboards
  labels:
    app: dashdot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashdot
  template:
    metadata:
      labels:
        app: dashdot
    spec:
      containers:
        - name: dashdot
          image: mauricenino/dashdot:latest
          ports:
            - containerPort: 3001
          env:
            - name: DASHDOT_PORT
              value: "3001"
            - name: DASHDOT_ENABLE_CPU_TEMPS
              value: "true"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashdot
  namespace: dashboards
spec:
  selector:
    app: dashdot
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashdot
  namespace: dashboards
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: dashdot.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashdot
                port:
                  number: 80
