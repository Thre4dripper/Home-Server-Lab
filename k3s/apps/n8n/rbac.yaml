apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: automation
---
# Grants n8n full cluster-admin access so it can manage any k8s resource.
# This is a personal homelab — tighten this if you ever expose n8n externally.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: n8n-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: n8n
    namespace: automation
