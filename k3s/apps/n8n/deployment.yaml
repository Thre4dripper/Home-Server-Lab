apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation
  labels:
    app: n8n
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      # n8n service account has cluster-admin — required for the Kubernetes node
      # credential type "Automatic" (in-cluster config via pod service account token).
      serviceAccountName: n8n
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        # GID 988 = docker group on the Pi host — lets node user access /var/run/docker.sock
        supplementalGroups: [988]
      containers:
        - name: n8n
          # Custom image built from docker/n8n/Dockerfile — includes aws, kubectl, helm,
          # terraform, rclone, python3, docker CLI, yq, jq and all n8n env defaults.
          # Build: docker build -t forgejo.home.ijlalahmad.dev/<user>/n8n-custom:latest docker/n8n/
          # Push:  docker push forgejo.home.ijlalahmad.dev/<user>/n8n-custom:latest
          image: forgejo.home.ijlalahmad.dev/ijlal/n8n-custom:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5678
              name: web
          env:
            # --- URL / proxy (behind Traefik HTTPS) ---
            - name: N8N_HOST
              value: "n8n.home.ijlalahmad.dev"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: WEBHOOK_URL
              value: "https://n8n.home.ijlalahmad.dev/"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.home.ijlalahmad.dev/"
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_SECURE_COOKIE
              value: "true"
            - name: GENERIC_TIMEZONE
              value: "Asia/Kolkata"
            - name: TZ
              value: "Asia/Kolkata"

            # --- Storage: Postgres ---
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "postgres.databases.svc.cluster.local"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n_user"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: N8N_DB_PASSWORD
            - name: DB_POSTGRESDB_CONNECTION_TIMEOUT
              value: "30000"
            - name: DB_POSTGRESDB_POOL_SIZE
              value: "5"

            # --- Encryption key (must persist across restarts) ---
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: N8N_ENCRYPTION_KEY

            # --- One-shot: migrate legacy nested binaryData to storage/ (n8n v3 prep) ---
            - name: N8N_MIGRATE_FS_STORAGE_PATH
              value: "true"

            # --- Risky / advanced node access ---
            - name: NODE_FUNCTION_ALLOW_BUILTIN
              value: "*"
            - name: NODE_FUNCTION_ALLOW_EXTERNAL
              value: "*"
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            - name: N8N_COMMUNITY_PACKAGES_ENABLED
              value: "true"
            - name: N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE
              value: "true"

            # --- Execute Command node (removed from n8n v2 by default) ---
            - name: N8N_ENABLE_EXECUTE_COMMAND
              value: "true"
            - name: NODES_EXCLUDE
              value: "[]"

            # --- Execution / pruning ---
            - name: EXECUTIONS_MODE
              value: "regular"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: "336" # 14 days
            - name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
              value: "10000"

            # --- Telemetry / nags off (personal cluster) ---
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: N8N_TEMPLATES_ENABLED
              value: "true"
            - name: N8N_PERSONALIZATION_ENABLED
              value: "false"
            - name: N8N_HIRING_BANNER_ENABLED
              value: "false"

            # --- Hardening ---
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: N8N_GIT_NODE_DISABLE_BARE_REPOS
              value: "true"

            # --- Logging ---
            - name: N8N_LOG_LEVEL
              value: "info"
            - name: N8N_LOG_OUTPUT
              value: "console"

            # --- Node.js ---
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
            # Docker socket — lets the Docker CLI inside n8n talk to the host daemon
            - name: docker-sock
              mountPath: /var/run/docker.sock
            # AWS credentials & config — avoids re-configuring aws inside the container
            - name: aws-config
              mountPath: /home/node/.aws
              readOnly: true
            # rclone config — cloud storage remotes already configured on the Pi
            - name: rclone-config
              mountPath: /home/node/.config/rclone
              readOnly: true
            # SSH keys — for git operations, rsync, remote commands
            - name: ssh-keys
              mountPath: /home/node/.ssh
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
        # Docker socket from host
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        # AWS credentials directory from pi home
        - name: aws-config
          hostPath:
            path: /home/pi/.aws
            type: DirectoryOrCreate
        # rclone config directory
        - name: rclone-config
          hostPath:
            path: /home/pi/.config/rclone
            type: DirectoryOrCreate
        # SSH keys
        - name: ssh-keys
          hostPath:
            path: /home/pi/.ssh
            type: DirectoryOrCreate
