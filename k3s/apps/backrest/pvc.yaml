apiVersion: v1
kind: PersistentVolume
metadata:
  name: backrest-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /home/pi/k3s-volumes/apps/backrest
    type: DirectoryOrCreate
  claimRef:
    name: backrest-data
    namespace: monitoring
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backrest-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: backrest-data
  resources:
    requests:
      storage: 1Gi
