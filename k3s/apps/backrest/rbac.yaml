apiVersion: v1
kind: ServiceAccount
metadata:
  name: backrest
  namespace: monitoring
---
# Grants the backrest pod permission to exec into database pods so that
# pre-backup hooks can run mongodump / pg_dumpall / sqlite3 without needing
# database credentials mounted into the backrest container itself.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backrest-db-exec
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backrest-db-exec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backrest-db-exec
subjects:
  - kind: ServiceAccount
    name: backrest
    namespace: monitoring
