apiVersion: apps/v1
kind: Deployment
metadata:
  name: twingate
  namespace: dashboard-network
  labels:
    app: twingate
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: twingate
  template:
    metadata:
      labels:
        app: twingate
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: twingate
          image: twingate/connector:1
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: twingate-secret
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            exec:
              command: ["connectorctl", "health"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["connectorctl", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
