apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portainer
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`portainer.home.ijlalahmad.dev`)
      kind: Rule
      services:
        - name: portainer
          port: 8500
  tls:
    secretName: wildcard-home-ijlalahmad-dev-tls
