apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: file-management
  labels:
    app: samba
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: samba
  template:
    metadata:
      labels:
        app: samba
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: samba
          image: dperson/samba:latest
          env:
            - name: TZ
              value: "UTC"
            - name: USERID
              value: "1000"
            - name: GROUPID
              value: "1000"
            - name: NMBD
              value: "true"
            - name: SAMBA_PASS
              valueFrom:
                secretKeyRef:
                  name: samba-secret
                  key: SAMBA_PASS
            # dperson/samba reads USER="username;password" to create the OS user
            # and register with smbpasswd on every container start
            - name: USER
              value: "pi;$(SAMBA_PASS)"
          volumeMounts:
            - name: smb-conf
              mountPath: /etc/samba/smb.conf
              subPath: smb.conf
              readOnly: true
            - name: samba-state
              mountPath: /var/lib/samba/private
            - name: public
              mountPath: /shares/public
            - name: private
              mountPath: /shares/private
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: smb-conf
          configMap:
            name: samba-config
        # Samba's internal account/secrets DB (TDB files). Ephemeral; the
        # only "user" is recreated from the SAMBA_PASS env var on each start.
        - name: samba-state
          emptyDir: {}
        # Public exposes the shared downloads directory
        # (same on-disk location aria2 + bitcomet write into).
        - name: public
          hostPath:
            path: /home/pi/pendrive/downloads
            type: DirectoryOrCreate
        # Private share exposes the entire pendrive root for authenticated
        # access to course folders, fastapi, etc.
        - name: private
          hostPath:
            path: /home/pi/pendrive
            type: Directory
