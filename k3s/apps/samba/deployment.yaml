apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: file-management
  labels:
    app: samba
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: samba
  template:
    metadata:
      labels:
        app: samba
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: samba
          image: dperson/samba:latest
          env:
            - name: TZ
              value: "UTC"
            - name: USERID
              value: "1000"
            - name: GROUPID
              value: "1000"
            - name: NMBD
              value: "true"
          volumeMounts:
            - name: smb-conf
              mountPath: /etc/samba/smb.conf
              subPath: smb.conf
              readOnly: true
            - name: private
              mountPath: /var/lib/samba/private
            - name: public
              mountPath: /shares/public
            - name: media
              mountPath: /shares/media
            - name: documents
              mountPath: /shares/documents
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: smb-conf
          configMap:
            name: samba-config
        - name: private
          emptyDir: {}
        - name: public
          hostPath:
            path: /home/pi/shared
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /home/pi/media
            type: DirectoryOrCreate
        - name: documents
          hostPath:
            path: /home/pi/documents
            type: DirectoryOrCreate
