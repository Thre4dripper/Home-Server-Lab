## Traefik IngressRouteTCP for Forgejo SSH access.
##
## SSH does not use TLS, so Traefik cannot route by HostSNI.
## HostSNI("*") catches all traffic on the dedicated `forgejo-ssh`
## entrypoint (port 2222) and forwards it to the Forgejo pod.
##
## Cloudflare DNS: forgejo.home.ijlalahmad.dev → 192.168.0.108
## Clone URL: ssh://git@forgejo.home.ijlalahmad.dev:2222/user/repo.git
##   or with git config: git clone git@forgejo.home.ijlalahmad.dev:2222:user/repo.git

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: forgejo-ssh
  namespace: traefik
spec:
  entryPoints:
    - forgejo-ssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: forgejo
          namespace: git
          port: 2222
