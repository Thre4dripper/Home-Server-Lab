services:
  bitcomet:
    image: wxhere/bitcomet-webui:${BITCOMET_VERSION:-latest}
    container_name: ${CONTAINER_NAME:-bitcomet}
    restart: ${RESTART_POLICY:-unless-stopped}

    ports:
      - "${BITCOMET_WEBUI_PORT:-6080}:8080"                              # WebUI
      - "${BITCOMET_BT_PORT:-6882}:${BITCOMET_BT_PORT:-6882}/tcp"        # BitTorrent TCP
      - "${BITCOMET_BT_PORT:-6882}:${BITCOMET_BT_PORT:-6882}/udp"        # BitTorrent UDP

    environment:
      - BITCOMET_WEBUI_PORT=8080
      - BITCOMET_BT_PORT=${BITCOMET_BT_PORT:-6882}
      - WEBUI_USERNAME=${WEBUI_USERNAME:-admin}
      - WEBUI_PASSWORD=${WEBUI_PASSWORD:-admin}
      - TZ=${TIMEZONE:-Asia/Kolkata}

    volumes:
      - ./config:/root/.config/BitComet:rw
      - ${DOWNLOADS_PATH:-./downloads}:/root/Downloads:rw

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-512M}
        reservations:
          memory: ${MEMORY_RESERVATION:-128M}

networks:
  default:
    name: bitcomet
    driver: bridge
