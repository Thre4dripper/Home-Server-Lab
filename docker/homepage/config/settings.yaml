---
title: Home Server Lab
favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/homepage.png

theme: dark
color: slate

headerStyle: clean

# Full-width layout for ultrawide (21:9) monitors
fullWidth: true
maxGroupColumns: 8
useEqualHeights: true
showStats: true
statusStyle: dot

layout:
  Monitoring & Calendar:
    style: row
    columns: 3
    icon: mdi-chart-box
    useEqualHeights: true
  Infrastructure:
    style: row
    columns: 5
    icon: mdi-server-network
  Media & Downloads:
    style: row
    columns: 5
    icon: mdi-multimedia
  Cloud & Files:
    style: row
    columns: 5
    icon: mdi-cloud
  Development & Tools:
    style: row
    columns: 4
    icon: mdi-code-braces

providers:
  openweathermap: openweathermapapikey
  weatherapi: weatherapiapikey
  finnhub: yourfinnhubapikeyhere
