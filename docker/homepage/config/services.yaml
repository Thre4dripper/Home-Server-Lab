        server: local
        container: deluge
        widget:
          type: deluge
          url: http://192.168.0.108:8112
          password: "{{HOMEPAGE_VAR_DELUGE_PASS}}"
    - Aria2:
        icon: aria2
        href: http://192.168.0.108:8080
        description: Multi-protocol download manager
        server: local
