    - Home Assistant:
        icon: home-assistant
        href: https://ha.home.ijlalahmad.dev
        siteMonitor: https://ha.home.ijlalahmad.dev
        description: Smart home hub
    - BitComet:
        icon: mdi-star-shooting
        href: https://bitcomet.home.ijlalahmad.dev/webui/
