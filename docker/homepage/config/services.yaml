---
- Monitoring & Calendar:
    - Calendar:
        icon: mdi-calendar-month
        widget:
          type: calendar
          firstDayInWeek: sunday
          view: monthly
          maxEvents: 10
          showTime: true
          timezone: Asia/Kolkata
    - Docker Containers:
        icon: mdi-docker
        description: Container overview
        server: local
        container: portainer
        widget:
          type: portainer
          url: http://192.168.0.108:9000
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
          fields: ["running", "stopped", "total"]
    - System Resources:
        icon: mdi-speedometer
        description: Host performance
        widget:
          type: customapi
          url: http://192.168.0.108:19999/api/v1/info
          refreshInterval: 5000
          mappings:
            - field: os_name
              label: OS
            - field: os_version
              label: Version

- Infrastructure:
    - Portainer:
        icon: portainer
        href: http://192.168.0.108:9000
        description: Docker container management
        server: local
        container: portainer
        widget:
          type: portainer
          url: http://192.168.0.108:9000
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
    - Pi-hole:
        icon: pi-hole
        href: http://192.168.0.108:8080/admin
        description: Network-wide ad blocker & DNS
        server: local
        container: pihole
        widget:
          type: pihole
          url: http://192.168.0.108:8080
          key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"
    - Nginx:
        icon: nginx-proxy-manager
        href: http://192.168.0.108:81
        description: Reverse proxy manager
        server: local
        container: nginx-proxy-manager
    - Netdata:
        icon: netdata
        href: http://192.168.0.108:19999
        description: Real-time performance monitoring
        server: local
        container: netdata
        widget:
          type: netdata
          url: http://192.168.0.108:19999
    - Home Assistant:
        icon: home-assistant
        href: http://192.168.0.108:8123
        description: Smart home automation
        server: local
        container: homeassistant
    - Dashdot:
        icon: dashdot
        href: http://192.168.0.108:3001
        description: Server hardware monitoring
        server: local
        container: dashdot
    - Homarr:
        icon: homarr
        href: http://192.168.0.108:7575
        description: Alternative dashboard
        server: local
        container: homarr

- Media & Downloads:
    - Jellyfin:
        icon: jellyfin
        href: http://192.168.0.108:8096
        description: Media streaming server
        server: local
        container: jellyfin
        widget:
          type: jellyfin
          url: http://192.168.0.108:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true
    - Plex:
        icon: plex
        href: http://192.168.0.108:32400/web
        description: Premium media streaming
        server: local
        container: plex
        widget:
          type: plex
          url: http://192.168.0.108:32400
          key: "{{HOMEPAGE_VAR_PLEX_KEY}}"
    - qBittorrent:
        icon: qbittorrent
        href: http://192.168.0.108:8080
        description: Torrent download client
        server: local
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://192.168.0.108:8080
          username: "{{HOMEPAGE_VAR_QBIT_USER}}"
          password: "{{HOMEPAGE_VAR_QBIT_PASS}}"
    - Deluge:
        icon: deluge
        href: http://192.168.0.108:8112
