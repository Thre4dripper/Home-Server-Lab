name: 🔐 Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Deep scan every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # for SARIF upload
  pull-requests: write     # to comment on PRs

jobs:
  # ───────────────────────────────────────────────────────────────
  # Fast scan: gitleaks on every push / PR
  # ───────────────────────────────────────────────────────────────
  gitleaks:
    name: 🕵️ gitleaks (fast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for proper diff

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ───────────────────────────────────────────────────────────────
  # Deep scan: trufflehog with verification (weekly + manual)
  # ───────────────────────────────────────────────────────────────
  trufflehog:
    name: 🐷 trufflehog (deep + verified)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --results=verified,unknown

  # ───────────────────────────────────────────────────────────────
  # Filesystem vulnerability scan (Trivy)
  # ───────────────────────────────────────────────────────────────
  trivy-fs:
    name: 🛡️ trivy (filesystem + IaC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy (config + secret + vuln)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0   # don't fail the build, just report
          scanners: vuln,secret,misconfig

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
