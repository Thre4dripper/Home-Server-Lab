name: 🔄 Auto-Update READMEs

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/*/README.md'
      - 'k3s/apps/*/README.md'
      - 'k3s/databases/*/README.md'
      - '.github/scripts/update-docker-readme.py'
      - '.github/scripts/update-k3s-readme.py'
      - '.github/scripts/update-global-readme.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/*/README.md'
      - 'k3s/apps/*/README.md'
      - 'k3s/databases/*/README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    name: 📊 Regenerate ${{ matrix.stack }} catalog
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: docker
            script: .github/scripts/update-docker-readme.py
            target: docker/README.md
            emoji: "🐳"
          - stack: k3s
            script: .github/scripts/update-k3s-readme.py
            target: k3s/README.md
            emoji: "☸️"
          - stack: global
            script: .github/scripts/update-global-readme.py
            target: README.md
            emoji: "🏠"

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install pyyaml

      - name: 🔍 Regenerate ${{ matrix.target }}
        id: scan
        run: |
          python ${{ matrix.script }}
          if git diff --quiet ${{ matrix.target }}; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📊 No changes detected in ${{ matrix.target }}"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📊 Changes detected in ${{ matrix.target }}"
          fi

      - name: 📋 Show Diff
        if: steps.scan.outputs.changed == 'true'
        run: git --no-pager diff ${{ matrix.target }}

      - name: ✅ Commit & Push
        if: steps.scan.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ matrix.target }}
          git commit -m "🤖 ${{ matrix.emoji }} Auto-update ${{ matrix.stack }} README"
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && \
            git push origin HEAD:${{ github.ref_name }} && break
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 1))
          done

      - name: 💬 Comment on PR
        if: steps.scan.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **${{ matrix.emoji }} Auto-generated ${{ matrix.stack }} README update**\n\nMerging this PR will regenerate \`${{ matrix.target }}\` from updated service frontmatter.`
            })
