---
# k3s installation role

- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s
  block:
    - name: Create k3s data directory (if custom path)
      file:
        path: "{{ k3s_data_dir }}"
        state: directory
        mode: '0755'
      when: k3s_data_dir != "/var/lib/rancher/k3s"

    - name: Download and install k3s
      shell: |
        curl -sfL {{ k3s_install_script_url }} | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        {% if k3s_data_dir != "/var/lib/rancher/k3s" %}K3S_DATA_DIR="{{ k3s_data_dir }}"{% endif %} \
        sh -
      args:
        creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

# ─── Hardened network-wait drop-in ──────────────────────────────────────────
# Upgrades the default Wants=network-online.target (soft) to Requires= (hard)
# and adds an ExecStartPre that verifies the static IP is on the interface.
# This prevents K3s from starting with no node IP after a power cut, which
# would cause flannel to leave iptables in a state that blocks all traffic.

- name: Create k3s systemd drop-in directory
  file:
    path: /etc/systemd/system/k3s.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy k3s network-wait drop-in
  template:
    src: k3s-network-wait.conf.j2
    dest: /etc/systemd/system/k3s.service.d/10-network-wait.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart k3s

# ─── K3s config ──────────────────────────────────────────────────────────────

- name: Ensure /etc/rancher/k3s directory exists
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy k3s config.yaml with node-ip
  template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: restart k3s

- name: Ensure k3s service is enabled and started
  service:
    name: k3s
    state: started
    enabled: yes

- name: Wait for k3s to be ready
  command: k3s kubectl get nodes
  register: k3s_ready
  until: k3s_ready.rc == 0
  retries: 12
  delay: 5
  changed_when: false

- name: Create .kube directory for homelab user
  file:
    path: "/home/{{ homelab_user }}/.kube"
    state: directory
    owner: "{{ homelab_user }}"
    group: "{{ homelab_user }}"
    mode: '0755'

- name: Copy k3s kubeconfig to user directory
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ homelab_user }}/.kube/config"
    remote_src: yes
    owner: "{{ homelab_user }}"
    group: "{{ homelab_user }}"
    mode: '0600'

- name: Update kubeconfig server address
  replace:
    path: "/home/{{ homelab_user }}/.kube/config"
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ ansible_default_ipv4.address }}:6443"

- name: Display k3s status
  debug:
    msg: |
      ✅ k3s installed and running
      Version: {{ k3s_version }}
      Data dir: {{ k3s_data_dir }}
      Kubeconfig: /home/{{ homelab_user }}/.kube/config
