---
# Helm installation role

- name: Check if Helm is already installed
  command: helm version
  register: helm_installed
  failed_when: false
  changed_when: false

- name: Install Helm
  block:
    - name: Download Helm installation script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm.sh
        mode: '0755'
    
    - name: Run Helm installation script
      environment:
        DESIRED_VERSION: "v{{ helm_version }}"
      command: sh /tmp/get-helm.sh
      args:
        creates: /usr/local/bin/helm
    
    - name: Remove Helm installation script
      file:
        path: /tmp/get-helm.sh
        state: absent
  when: helm_installed.rc != 0

- name: Add common Helm repositories
  command: "helm repo add {{ item.name }} {{ item.url }}"
  loop:
    - { name: 'stable', url: 'https://charts.helm.sh/stable' }
    - { name: 'bitnami', url: 'https://charts.bitnami.com/bitnami' }
    - { name: 'argo', url: 'https://argoproj.github.io/argo-helm' }
  register: helm_repo_add
  failed_when: false
  changed_when: "'already exists' not in helm_repo_add.stderr"

- name: Update Helm repositories
  command: helm repo update
  changed_when: false

- name: Display Helm version
  debug:
    msg: "✅ Helm v{{ helm_version }} installed"
