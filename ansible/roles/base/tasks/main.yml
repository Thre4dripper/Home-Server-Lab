---
# Base system role — packages, timezone, locale, SSH hardening, firewall, network

# ─── Network: static IP + DNS ─────────────────────────────────────────────────
# Must run before package installs so DNS is healthy from the start.

- name: Disable cloud-init network management
  copy:
    src: 99-disable-network-config.cfg
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: '0644'

- name: Configure static IP via netplan
  template:
    src: netplan-static.yaml.j2
    dest: /etc/netplan/50-cloud-init.yaml
    owner: root
    group: root
    mode: '0600'
  notify: apply netplan

- name: Enable and start systemd-resolved
  service:
    name: systemd-resolved
    state: started
    enabled: yes

- name: Point /etc/resolv.conf to systemd-resolved stub
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes

- name: Raise inotify limits for K3s and containerd
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-k3s-inotify.conf
    reload: yes
  loop:
    - { name: fs.inotify.max_user_watches, value: "524288" }
    - { name: fs.inotify.max_user_instances, value: "1024" }

# ─── Packages ─────────────────────────────────────────────────────────────────
- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Update dnf cache (RHEL/Fedora)
  dnf:
    update_cache: yes
  when: ansible_os_family == "RedHat"

- name: Install base packages
  package:
    name: "{{ extra_packages }}"
    state: present

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Set locale
  locale_gen:
    name: "{{ locale }}"
    state: present
  when: ansible_os_family == "Debian"

- name: Configure SSH hardening
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: 'sshd -t -f %s'
  loop:
    - { regexp: '^#?Port', line: "Port {{ ssh_port }}" }
    - { regexp: '^#?PermitRootLogin', line: "PermitRootLogin {{ ssh_permit_root_login }}" }
    - { regexp: '^#?PasswordAuthentication', line: "PasswordAuthentication {{ ssh_password_authentication }}" }
    - { regexp: '^#?PubkeyAuthentication', line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}" }
  notify: restart ssh

- name: Install UFW (Debian/Ubuntu)
  apt:
    name: ufw
    state: present
  when: ansible_os_family == "Debian"

- name: Install firewalld (RHEL/Fedora)
  dnf:
    name: firewalld
    state: present
  when: ansible_os_family == "RedHat"

- name: Configure UFW firewall rules (Debian/Ubuntu)
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ firewall_allowed_ports }}"
  when: ansible_os_family == "Debian"

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
  when: ansible_os_family == "Debian"

- name: Configure firewalld rules (RHEL/Fedora)
  firewalld:
    port: "{{ item.port }}/{{ item.proto }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop: "{{ firewall_allowed_ports }}"
  when: ansible_os_family == "RedHat"

- name: Install Python packages
  pip:
    name: "{{ python_packages }}"
    state: present
    executable: pip3
